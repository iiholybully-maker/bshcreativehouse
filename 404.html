<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — B&Sh Creative House</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;500&family=Tajawal:wght@500;700&family=Cairo:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#C8877C;--blush:#EED7D3;--brown:#7A5C55;--ivory:#F6F2F1}
body{
font-family:'Montserrat',sans-serif;background:var(--ivory);color:var(--brown);
min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
text-align:center;padding:40px 20px;
}
.code{font-family:'Cormorant Garamond',serif;font-size:clamp(5rem,15vw,10rem);font-weight:700;color:var(--rose);line-height:1}
.msg{font-size:1.1rem;color:var(--brown);margin:16px 0 8px}
.msg-ar{font-family:'Tajawal',sans-serif;font-size:1.15rem;color:var(--brown);margin-bottom:32px;direction:rtl}
.back{
display:inline-block;padding:12px 36px;border-radius:100px;
background:var(--rose);color:#fff;text-decoration:none;
font-weight:500;font-size:.9rem;transition:transform .3s,box-shadow .3s;
}
.back:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,135,124,.35)}
</style>
</head>
<body>
<div class="code">404</div>
<p class="msg">This page doesn't exist.</p>
<p class="msg-ar">هذه الصفحة غير موجودة.</p>
<a href="/" class="back">Back to Home — العودة للرئيسية</a>
</body>
</html>
